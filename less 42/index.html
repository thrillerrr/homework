<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Формы</title>
  </head>
  <body>
    <form>
      <h2>Ваши личные данные</h2>
      <label>
        Ваше имя
        <input type="text" name="first-name" placeholder="Имя" />
      </label>
      <label>
        Ваш Возраст
        <input type="number" name="numeric" placeholder="Возраст" />
      </label>
      <label>
        Ваш номер телефона
        <input type="tel" name="phone" placeholder="Номер Телефона" required />
      </label>
      <label>
        Ваша Почта
        <input type="email" name="email" placeholder="Почта" required />
      </label>
      <label>
        Сообщение
        <textarea name="textarea" placeholder="Ваше сообщение"></textarea>
      </label>
      <label class="checkbox">
        <input type="checkbox" /> Я принимаю правила
      </label>
      <label>
        <button type="submit">Отправить</button>
      </label>
    </form>
  </body>
</html>
